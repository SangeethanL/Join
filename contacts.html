<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts</title>
    <link rel="icon" type="image/x-icon" href="assets/img/favicon-32x32.png">
    <script src="js/board/arrays_tasks-contacts.js"></script>
    <script src="js/contacts.js"></script>
    <script src="js/includeHTML.js"></script>
    <script src="js/login.js"></script>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/contacts.css">
    <link rel="stylesheet" href="CSS/contacts_responsive.css">
    <link rel="stylesheet" href="CSS/fonts_inter.css">
</head>

<body id="body-contacts" onload="init();setContacts();">
    <div id="side-and-topbar-contacts" w3-include-html="assets/templates/sid-and-topbar-template.html"></div>

    <!-- Main contacts overview -->
    <div id="contacts" class="main-div-contacts">
        <div class="sub-div-contacts flex flex-row" id="Webversion">
            <div class="contacts-div flex flex-column y-center">
                <div class="mb-32px">
                    <button onclick="openContactsOverlay()"
                        class="flex x-center y-center gap-16px btn-dark add-contacts-btn ft-general fs-21px fw-700">Add
                        new Contact
                        <img src="/assets/img/person_add.png" alt="add person"></button>

                </div>

                <!-- Contact book to render in contacts -->
                <div>
                    <table>
                        <tbody id="contact-book">
                            <td id="A-Title" class="separator" style="display: none;"><span>A</span></td>
                            <tr id="A" class="flex flex-column marginLetter">
                            </tr>

                            <td id="B-Title" class="separator" style="display: none;"><span>B</span></td>
                            <tr id="B" class="flex flex-column marginLetter">
                            </tr>

                            <td id="C-Title" class="separator" style="display: none;"><span>C</span></td>
                            <tr id="C" class="flex flex-column margintLetter">
                            </tr>

                            <td id="D-Title" class="separator" style="display: none;"><span>D</span></td>
                            <tr id="D" class="flex flex-column marginLetter">
                            </tr>

                            <td id="E-Title" class="separator" style="display: none;"><span>E</span></td>
                            <tr id="E" class="flex flex-column marginLetter">
                            </tr>

                            <td id="F-Title" class="separator" style="display: none;"><span>F</span></td>
                            <tr id="F" class="flex flex-column marginLetter">
                            </tr>

                            <td id="G-Title" class="separator" style="display: none;"><span>G</span></td>
                            <tr id="G" class="flex flex-column marginLetter">
                            </tr>

                            <td id="H-Title" class="separator" style="display: none;"><span>H</span></td>
                            <tr id="H" class="flex flex-column marginLetter">
                            </tr>

                            <td id="I-Title" class="separator" style="display: none;"><span>I</span></td>
                            <tr id="I" class="flex flex-column marginLetter">
                            </tr>

                            <td id="J-Title" class="separator" style="display: none;"><span>J</span></td>
                            <tr id="J" class="flex flex-column marginLetter">
                            </tr>

                            <td id="K-Title" class="separator" style="display: none;"><span>K</span></td>
                            <tr id="K" class="flex flex-column marginLetter">
                            </tr>

                            <td id="L-Title" class="separator" style="display: none;"><span>L</span></td>
                            <tr id="L" class="flex flex-column marginLetter">
                            </tr>

                            <td id="M-Title" class="separator" style="display: none;"><span>M</span></td>
                            <tr id="M" class="flex flex-column marginLetter">
                            </tr>

                            <td id="N-Title" class="separator" style="display: none;"><span>N</span></td>
                            <tr id="N" class="flex flex-column marginLetter">
                            </tr>

                            <td id="O-Title" class="separator" style="display: none;"><span>O</span></td>
                            <tr id="O" class="flex flex-column marginLetter">
                            </tr>

                            <td id="P-Title" class="separator" style="display: none;"><span>P</span></td>
                            <tr id="P" class="flex flex-column marginLetter">
                            </tr>

                            <td id="Q-Title" class="separator" style="display: none;"><span>Q</span></td>
                            <tr id="Q" class="flex flex-column marginLetter">
                            </tr>

                            <td id="R-Title" class="separator" style="display: none;"><span>R</span></td>
                            <tr id="R" class="flex flex-column marginLetter">
                            </tr>

                            <td id="S-Title" class="separator" style="display: none;"><span>S</span></td>
                            <tr id="S" class="flex flex-column marginLetter">
                            </tr>

                            <td id="T-Title" class="separator" style="display: none;"><span>T</span></td>
                            <tr id="T" class="flex flex-column marginLetter">
                            </tr>

                            <td id="U-Title" class="separator" style="display: none;"><span>U</span></td>
                            <tr id="U" class="flex flex-column marginLetter">
                            </tr>

                            <td id="V-Title" class="separator" style="display: none;"><span>V</span></td>
                            <tr id="V" class="flex flex-column marginLetter">
                            </tr>

                            <td id="W-Title" class="separator" style="display: none;"><span>W</span></td>
                            <tr id="W" class="flex flex-column marginLetter">
                            </tr>

                            <td id="X-Title" class="separator" style="display: none;"><span>X</span></td>
                            <tr id="X" class="flex flex-column marginLetter">
                            </tr>

                            <td id="Y-Title" class="separator" style="display: none;"><span>Y</span></td>
                            <tr id="Y" class="flex flex-column marginLetter">
                            </tr>

                            <td id="Z-Title" class="separator" style="display: none;"><span>Z</span></td>
                            <tr id="Z" class="flex flex-column marginLetter">
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <button onclick="openContactsOverlay()"
                class="flex x-center y-center  btn-dark add-contacts-btn-resp ft-general fs-21px fw-700">
                <img src="/assets/img/person_add.png" alt="add person"></button>

            <div class="team-slogan">
                <div class="flex x-start y-center mb-48px">
                    <span class="ft-general fs-61px fw-700">Contacts</span>
                    <img class="vertical-bl-line" src="assets/img/Vector_blue_vertical.png" alt="vertical blue line">
                    <span class="ft-general fs-27px fw-400">Better with a Team!</span>
                </div>
                <div id="contact-details">

                </div>
            </div>
        </div>

        <div class="displayContactResponsive d-none" id="ResponsiveVersion">
            <div class="team-slogan.Resp">
                <div class="flex flex-column y-start">
                    <div class="flex flex-row x-space-betw" style="width: 100%;">
                        <span class="ft-general fs-47px fw-700">Contacts</span>
                        <img src="assets/img/arrow-left-line.png" class="go-back go-back-size"
                            onclick="goBackToContacts()" alt="back">
                    </div>
                    <span class="ft-general fs-20px fw-400">Better with a Team!</span>
                    <img class="horizontal-bl-line" src="assets/img/Vector_blue_vertical.png" alt="vertical blue line">
                </div>
                <div id="contact-detailsResponsive">
    
                </div>
            </div>
        </div>
    
    </div>



    <!-- Overlay contacts menu -->
    <div id="overlay-contacts" class="contacts-overlay d-none z-ind-1 flex">
        <div class="bg-dark-blue flex flex-column x-center y-start">
            <img src="assets/img/Capa_2_light.png" alt="Join logo" class="join-logo-small mb-16px">
            <span class="ft-general fs-61px fw-700 mb-8px">Add contact</span>
            <span class="ft-general fs-27px fw-400 mb-16px">Tasks are better with a team!</span>
            <img src="assets/img/Vector 5.png" alt="blue horizontal line">
        </div>

        <div class="flex flex-row w-100 overlay-forms">
            <div class="flex y-center">
                <img src="assets/img/contact_person.png" alt="avatar">
            </div>
            <div class="flex flex-column x-center y-center w-100">
                <div class="flex w-100 x-end close-cross mb-48px"><img onclick="closeContactOverlay()" class="p-8px"
                        src="assets/img/close.png" alt="close"></div>

                <form onsubmit="createNewContact(); return false;" class="flex flex-column" id="newContactForm">
                    <div class="login-input mb-32px flex x-space-betw y-center">
                        <input class="ft-general fs-20px fw-400 input-icon-pos icon-name w-100" id="first-name"
                            placeholder="First-Name" type="text" required>
                    </div>
                    <div class="login-input mb-32px flex x-space-betw y-center">
                        <input class="ft-general fs-20px fw-400 input-icon-pos icon-name w-100" id="last-name"
                            placeholder="Last-Name" type="text" required>
                    </div>
                    <div class="login-input mb-32px flex x-space-betw y-center">
                        <input class="ft-general fs-20px fw-400 input-icon-pos icon-email w-100" id="email"
                            placeholder="Email" type="email" required>
                    </div>
                    <div class="login-input mb-32px flex x-space-betw y-center">
                        <input type="text" onkeypress="isInputNumber(event)" class="ft-general fs-20px fw-400 input-icon-pos icon-phone w-100"
                            id="telephoneNumber" placeholder="Phone" required>
                    </div>
                    <div class="flex x-start gap-35px">
                        <button onclick="closeContactOverlay()"
                            class="btn-light ft-general fs-21px fw-700 flex y-center gap-4px">Cancel
                            <img src="assets/img/close.png" alt="cancel"></button>
                        <button class="btn-dark ft-general fs-21px fw-700 flex y-center gap-4px">Create contact
                            <img src="assets/img/check.png" alt="add"></button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit contact form -->
    <div id="edit-contacts" class="contacts-overlay d-none z-ind-1 flex">
        <div class="bg-dark-blue flex flex-column x-center y-start">
            <img src="assets/img/Capa_2_light.png" alt="Join logo" class="join-logo-small mb-16px">
            <span class="ft-general fs-61px fw-700 mb-8px">Edit contact</span>
            <img src="assets/img/Vector 5.png" alt="blue horizontal line">
        </div>
        <div class="flex flex-row w-100 overlay-forms">
            <!-- <div id="edit-Overlay-Menu-Avatar" class="flex y-center"></div> -->
            <!-- <div class="flex y-center">
                <img src="assets/img/contact_person.png" alt="avatar">
            </div> -->
            <div id="contactIcon"
                style="display: flex; align-items: center; justify-content: center;background-color: rgba(255, 255, 255);">

            </div>
            <div class="flex flex-column x-center y-center w-100">
                <div class="flex w-100 x-end close-cross mb-48px"><img onclick="closeEditContactForm()" class="p-8px"
                        src="assets/img/close.png" alt="close"></div>

                <form onsubmit="saveChanges(); return false;" class="flex flex-column">
                    <div class="login-input mb-32px flex x-space-betw y-center">
                        <input contenteditable="true" class="ft-general fs-20px fw-400 input-icon-pos icon-name w-100"
                            id="edit-fist-name" placeholder="First-Name" type="text" value="" required>
                    </div>
                    <div class="login-input mb-32px flex x-space-betw y-center">
                        <input contenteditable="true" class="ft-general fs-20px fw-400 input-icon-pos icon-name w-100"
                            id="edit-last-name" placeholder="Last-Name" type="text" required>
                    </div>
                    <div class="login-input mb-32px flex x-space-betw y-center">
                        <input contenteditable="true" class="ft-general fs-20px fw-400 input-icon-pos icon-email w-100"
                            id="edit-email" placeholder="Email" type="email" required>
                    </div>
                    <div class="login-input mb-32px flex x-space-betw y-center">
                        <input type="text" onkeypress="isInputNumber(event)" contenteditable="true"
                            class="ft-general fs-20px fw-400 input-icon-pos icon-phone w-100" id="edit-number"
                            placeholder="Phone" required>
                    </div>
                    <div id="delete-part" class="flex x-start gap-35px">
                        <button class="btn-light ft-general fs-21px fw-700 flex y-center gap-4px"
                            onclick="deleteContact()" type="button">
                            Delete <img src="assets/img/close.png" alt="cancel">
                        </button>
                        <button id="safe-btn" class="btn-dark ft-general fs-21px fw-700 flex y-center gap-4px"
                            type="submit">
                            Safe <img src="assets/img/check.png" alt="add">
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>





    <!-- Overlay contacts menu RESPONSIVE -->
    <div id="overlay-contactsResponsive" class="contacts-overlay-Resp d-none z-ind-0 flex flex-column">
        <div class="bg-dark-blue flex flex-column x-center y-start">
            <div class="flex w-100 x-end close-cross mb-12px"><img onclick="closeContactOverlay()" class="p-8px"
                    src="assets/img/close.png" alt="close"></div>
            <span class="ft-general fs-27px fw-700 mb-8px">Add contact</span>
            <span class="ft-general fs-20px fw-400 mb-8px">Tasks are better with a team!</span>
            <img src="assets/img/Vector 5.png" alt="blue horizontal line">
        </div>
        <div class="contactAvatarIcon">
            <img src="assets/img/contact_person.png" alt="avatar" class="avatarIconSize">
        </div>
        <div class="bg-white flex flex-column w-100" style="padding-top: 20px;">
            <div class="flex flex-column x-center y-center w-100">

                <form onsubmit="createNewContact(); return false;" class="flex flex-column" id="newContactFormResponsive">
                    <div class="login-input-Resp mb-8px flex x-space-betw y-center">
                        <input class="ft-general fs-16px fw-400 input-icon-pos icon-name w-100" id="first-nameRESP"
                            placeholder="First-Name" type="text" required>
                    </div>
                    <div class="login-input-Resp mb-8px flex x-space-betw y-center">
                        <input class="ft-general fs-16px fw-400 input-icon-pos icon-name w-100" id="last-nameRESP"
                            placeholder="Last-Name" type="text" required>
                    </div>
                    <div class="login-input-Resp mb-8px flex x-space-betw y-center">
                        <input class="ft-general fs-16px fw-400 input-icon-pos icon-name w-100" id="emailRESP"
                            placeholder="Email" type="email" required>
                    </div>
                    <div class="login-input-Resp mb-8px flex x-space-betw y-center">
                        <input type="text" onkeypress="isInputNumber(event)" class="ft-general fs-16px fw-400 input-icon-pos icon-phone w-100"
                            id="telephoneNumberRESP" placeholder="Phone" required>
                    </div>
                    <div class="flex x-center gap-4px" style="padding-top: 20px;">
                        <button onclick="closeContactOverlay()"
                            class="btn-light-Resp ft-general fs-16px fw-700 flex y-center gap-4px">Cancel
                            <img src="assets/img/close.png" alt="cancel"></button>
                        <button class="btn-dark-Resp ft-general fs-16px fw-700 flex y-center gap-4px">Create contact
                            <img src="assets/img/check.png" alt="add"></button>
                    </div>
                </form>
            </div>
        </div>
    </div>




    <!-- Edit contact form RESPONSIVE -->
    <div id="edit-contactsResponsive" class="contacts-overlay-Resp d-none z-ind-0 flex flex-column">
        <div class="bg-dark-blue flex flex-column x-center y-start">
            <div class="flex w-100 x-end close-cross mb-12px">
                <img onclick="closeContactOverlay()" class="p-8px" src="assets/img/close.png" alt="close">
            </div>
            <span class="ft-general fs-27px fw-700 mb-8px">Edit contact</span>
            <img src="assets/img/Vector 5.png" alt="blue horizontal line">
        </div>
        <div id="contactIconResponsive" class="contactAvatarIcon">
        </div>
        <div class="bg-white flex flex-column w-100" style="padding-top: 20px;">
            <div class="flex flex-column x-center y-center w-100">

                <form onsubmit="saveChanges(); return false;" class="flex flex-column y-center">
                    <div class="login-input-Resp mb-8px flex x-space-betw y-center">
                        <input contenteditable="true" class="ft-general fs-16px fw-400 input-icon-pos icon-name w-100"
                            id="edit-fist-nameRESP" placeholder="First-Name" type="text" value="" required>
                    </div>
                    <div class="login-input-Resp mb-8px flex x-space-betw y-center">
                        <input contenteditable="true" class="ft-general fs-16px fw-400 input-icon-pos icon-name w-100"
                            id="edit-last-nameRESP" placeholder="Last-Name" type="text" required>
                    </div>
                    <div class="login-input-Resp mb-8px flex x-space-betw y-center">
                        <input contenteditable="true" class="ft-general fs-16px fw-400 input-icon-pos icon-name w-100"
                            id="edit-emailRESP" placeholder="Email" type="email" required>
                    </div>
                    <div class="login-input-Resp mb-8px flex x-space-betw y-center">
                        <input type="text" onkeypress="isInputNumber(event)" contenteditable="true"
                            class="ft-general fs-16px fw-400 input-icon-pos icon-phone w-100" id="edit-numberRESP"
                            placeholder="Phone" required>
                    </div>
                    <div id="delete-partResponsive" class="flex x-center gap-35px">
                        <button class="btn-light-Resp ft-general fs-21px fw-700 flex y-center gap-4px"
                            onclick="deleteContact()" type="button">
                            Delete <img src="assets/img/close.png" alt="cancel">
                        </button>
                        <button id="safe-btn" class="btn-dark-Resp ft-general fs-21px fw-700 flex y-center gap-4px"
                            type="submit">
                            Safe <img src="assets/img/check.png" alt="add">
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>




</body>

</html>
